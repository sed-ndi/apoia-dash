// Color scale for heatmap
function getHeatmapColor(pct) {
  const stops = [
    [0.0, 255, 245, 235],
    [0.15, 254, 230, 206],
    [0.30, 253, 174, 107],
    [0.50, 253, 141, 60],
    [0.75, 230, 85, 13],
    [1.0, 166, 54, 3]
  ];
  const t = Math.min(pct / 30.65, 1.0);
  for (let i = stops.length - 1; i >= 0; i--) {
    if (t >= stops[i][0]) {
      const next = stops[Math.min(i, 1, stops.length-1)];
      const local = (t - stops[i][0]) / (next[0] - stops[i][0] || 1);
      return [
        Math.round(stops[i][1]   (next[1]-stops[i][1]) * local),
        Math.round(stops[i][2]   (next[2]-stops[i][2]) * local),
        Math.round(stops[i][3]   (next[3]-stops[i][3]) * local),
        200
      ];
    }
  }
  return stops[0].slice(1).concat([200]);
}

// Build legend
const legendDiv = document.getElementById('legend-regioes');
for (const [regiao, cor] of Object.entries(REGIAO_COLOR)) {
  legendDiv.innerHTML  = `<div class="legend-item"><div class="legend-color" style="background:${cor}"></div><span>${regiao.replace('Região ','')}</span></div>`;
}

// Layers
function buildLayers(showHeatmap, showPoints, radius, intensity) {
  const layers = [];

  if (showHeatmap) {
    layers.push(new deck.HeatmapLayer({
      id: 'heatmap',
      data: POINTS,
      getPosition: d => d.position,
      getWeight: d => d.pct_risco,
      radiusPixels: radius,
      intensity: intensity / 10,
      threshold: 0.02,
      colorRange: [
        [255, 245, 235],
        [254, 230, 206],
        [253, 174, 107],
        [253, 141, 60],
        [230, 85, 13],
        [166, 54, 3]
      ],
      aggregation: 'SUM'
    }));
  }

  if (showPoints) {
    layers.push(new deck.ScatterplotLayer({
      id: 'points',
      data: POINTS,
      getPosition: d => d.position,
      getRadius: d => Math.max(4, Math.sqrt(d['Em risco']) * 33),
      getFillColor: d => {
        const hex = REGIAO_COLOR[d['Região']] || '#888';
        const r = parseInt(hex.slice(1,3),16);
        const g = parseInt(hex.slice(3,5),16);
        const b = parseInt(hex.slice(5,7),16);
        return [r, g, b, 200];
      },
      getLineColor: [13, 17, 23, 200],
      getLineWidth: 1.5,
      lineWidthMinPixels: 1,
      pickable: true,
      radiusMinPixels: 3,
      radiusMaxPixels: 30,
      opacity: 0.9
    }));
  }

  return layers;
}

const deckgl = new deck.DeckGL({
  container: 'container',
  mapStyle: 'mapbox://styles/mapbox/dark-v11',
  mapboxApiAccessToken: MAPBOX_TOKEN,
  initialViewState: {
    longitude: -48.8487,
    latitude: -26.3045,
    zoom: 11,
    pitch: 0,
    bearing: 0
  },
  controller: true,
  layers: buildLayers(true, true, 40, 15),
  getTooltip: info => {
    if (!info.object || !info.object.Unidade) return null;
    const d = info.object;
    const pctBar = Math.min(d.pct_risco / 30.65 * 100, 100);
    return {
      html: `
        <div class="nome">${d.Unidade}</div>
        <div><span class="label">Bairro:</span> <span class="value">${d.Bairro}</span></div>
        <div><span class="label">Região:</span> <span class="value">${d['Região'].replace('Região ','')}</span></div>
        <div style="margin:6px 0 2px;"><span class="label">Em risco:</span> <span class="value" style="color:#ff6b6b">${d['Em risco']} alunos (${d.pct_risco}%)</span></div>
        <div class="bar"><div class="bar-fill" style="width:${pctBar}%"></div></div>
        <div><span class="label">Casos APOIA:</span> <span class="value">${d['Casos APOIA']}</span></div>
        <div><span class="label">Total alunos UE:</span> <span class="value">${d['Total Alunos UE']}</span></div>
        <div><span class="label">Em atraso:</span> <span class="value">${d['Em Atraso']}</span></div>
        <div><span class="label">Em andamento UE:</span> <span class="value">${d['Em andamento UE']}</span></div>
      `,
      style: { color: '#c9d1d9' }
    };
  }
});

// Controls
function updateLayers() {
  const showHeat = document.getElementById('toggle-heatmap').checked;
  const showPts = document.getElementById('toggle-points').checked;
  const radius = parseInt(document.getElementById('radius-slider').value);
  const intensity = parseInt(document.getElementById('intensity-slider').value);
  deckgl.setProps({ layers: buildLayers(showHeat, showPts, radius, intensity) });
}

document.getElementById('toggle-heatmap').addEventListener('change', updateLayers);
document.getElementById('toggle-points').addEventListener('change', updateLayers);
document.getElementById('radius-slider').addEventListener('input', updateLayers);
document.getElementById('intensity-slider').addEventListener('input', updateLayers);
</script>
